name: Deploy Preview to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [COR-118-tech-build, main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          ASTRO_BASE: /morningstar-regmed-v3

      - name: Rewrite absolute paths for GitHub Pages subpath
        run: node scripts/rewrite-for-gh-pages.mjs /morningstar-regmed-v3

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: .
          enable_jekyll: false

      - name: Enable GitHub Pages (gh-pages branch)
        run: |
          curl -s -X POST "https://api.github.com/repos/${{ github.repository }}/pages" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"source":{"branch":"gh-pages","path":"/"}}' || \
          curl -s -X PUT "https://api.github.com/repos/${{ github.repository }}/pages" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"source":{"branch":"gh-pages","path":"/"}}'
          echo "Preview URL: https://${{ github.repository_owner }}.github.io/$(echo ${{ github.repository }} | cut -d/ -f2)/"
